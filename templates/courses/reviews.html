{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">

    <!-- Заголовок с названием курса -->
    <h2>{{ course.name }} — все отзывы</h2>

    <!-- Форма для сортировки отзывов -->
    <form method="get">
        <select name="sort">
            <option value="new" {% if sort == 'new' %}selected{% endif %}>Сначала новые</option>
            <option value="positive" {% if sort == 'positive' %}selected{% endif %}>Сначала положительные</option>
            <option value="negative" {% if sort == 'negative' %}selected{% endif %}>Сначала отрицательные</option>
        </select>
        <button type="submit">Применить</button>
    </form>

    <!-- Список всех отзывов с информацией: автор, дата, рейтинг, текст -->
    {% for review in reviews %}
        <div class="card mt-3 p-3">
            <p><strong>{{ review.user.full_name }}</strong></p>
            <p>{{ review.created_at.strftime('%d.%m.%Y') }}</p>
            <p>⭐ {{ review.rating }}</p>
            <p>{{ review.text }}</p>
        </div>
    {% endfor %}

    <!-- Навигация по страницам отзывов -->
    <div class="mt-3">
        {% if page > 1 %}
            <a href="?page={{ page-1 }}&sort={{ sort }}">Назад</a>
        {% endif %}

        <a href="?page={{ page+1 }}&sort={{ sort }}">Вперёд</a>
    </div>

</div>
{% endblock %}
